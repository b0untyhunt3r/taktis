<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square — uses accent fill so it works on any background -->
  <rect width="32" height="32" rx="8" fill="url(#fg)"/>
  <!-- T mark — white on indigo -->
  <rect x="7" y="8" width="18" height="3.5" rx="1.75" fill="#fff"/>
  <rect x="14.25" y="8" width="3.5" height="16" rx="1.75" fill="#fff"/>
  <!-- Pipeline nodes — subtle white dots -->
  <circle cx="10" cy="20" r="1.4" fill="#fff" opacity="0.45"/>
  <circle cx="16" cy="26" r="1.4" fill="#fff" opacity="0.6"/>
  <circle cx="22" cy="20" r="1.4" fill="#fff" opacity="0.45"/>
</svg>
