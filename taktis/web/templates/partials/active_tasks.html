{% for task in active_tasks %}
<tr class="active-task-row" onclick="window.location='/tasks/{{ task.id }}'" style="cursor:pointer; border-left: 3px solid {% if task.status == 'running' %}var(--accent){% elif task.status == 'awaiting_input' %}var(--warning){% else %}transparent{% endif %};">
  <td><a href="/tasks/{{ task.id }}" class="mono">{{ task.id[:12] }}</a></td>
  <td><span class="badge badge-{{ task.status }}">{{ task.status }}</span></td>
  <td>{{ task.wave | default('—') }}</td>
  <td>{{ task.expert | default('—') }}</td>
  <td>{{ task.started_at | dt }}</td>
</tr>
{% else %}
<tr>
  <td colspan="5" style="text-align:center; padding:2.5rem 1rem;">
    <div style="color:var(--text-muted); font-size:0.85rem;">No active tasks</div>
    <div style="color:var(--text-muted); font-size:0.75rem; margin-top:0.35rem; opacity:0.6;">Tasks will appear here when running</div>
  </td>
</tr>
{% endfor %}
